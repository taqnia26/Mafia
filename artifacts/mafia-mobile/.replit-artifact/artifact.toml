kind = "mobile"
previewPath = "/mafia-mobile/"
title = "Mafia World"
version = "1.0.0"
id = "artifacts/mafia-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mafia-mobile/" ]
localPort = 21853

[services.development]
run = "pnpm --filter @workspace/mafia-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mafia-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mafia-mobile", "run", "serve" ]

[services.env]
PORT = "21853"
BASE_PATH = "/mafia-mobile/"
