openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Mafia World Game API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: players
    description: Player operations
  - name: gangs
    description: Gang operations
  - name: weapons
    description: Weapon and ammo operations
  - name: bodyguards
    description: Bodyguard operations
  - name: attacks
    description: Attack and spy operations
  - name: blackmarket
    description: Black market trading
  - name: crimes
    description: Crime and prison operations
  - name: cities
    description: City operations
  - name: armor
    description: Armor protection operations
  - name: dashboard
    description: Dashboard and stats
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- PLAYERS ---
  /players/me:
    get:
      operationId: getMyProfile
      tags: [players]
      summary: Get current player profile
      responses:
        "200":
          description: Player profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    patch:
      operationId: updateMyProfile
      tags: [players]
      summary: Update current player profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/me/anti-spy:
    post:
      operationId: toggleAntiSpy
      tags: [players]
      summary: Toggle anti-spy mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AntiSpyToggle"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List all players
      parameters:
        - in: query
          name: cityId
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerListResponse"

  /players/{playerId}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get a player by ID
      parameters:
        - in: path
          name: playerId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  # --- DASHBOARD ---
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get player dashboard summary stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed for current player
      responses:
        "200":
          description: Activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [dashboard]
      summary: Get top players leaderboard
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  # --- GANGS ---
  /gangs:
    get:
      operationId: listGangs
      tags: [gangs]
      summary: List all gangs
      responses:
        "200":
          description: List of gangs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Gang"
    post:
      operationId: createGang
      tags: [gangs]
      summary: Create a new gang
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GangInput"
      responses:
        "201":
          description: Created gang
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gang"

  /gangs/{gangId}:
    get:
      operationId: getGang
      tags: [gangs]
      summary: Get gang details
      parameters:
        - in: path
          name: gangId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Gang
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gang"

  /gangs/{gangId}/join:
    post:
      operationId: joinGang
      tags: [gangs]
      summary: Join a gang
      parameters:
        - in: path
          name: gangId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GangMember"

  /gangs/me/leave:
    post:
      operationId: leaveGang
      tags: [gangs]
      summary: Leave current gang
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /gangs/{gangId}/members:
    get:
      operationId: listGangMembers
      tags: [gangs]
      summary: List gang members
      parameters:
        - in: path
          name: gangId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GangMember"

  /gangs/{gangId}/members/{memberId}/promote:
    post:
      operationId: promoteMember
      tags: [gangs]
      summary: Promote a gang member
      parameters:
        - in: path
          name: gangId
          required: true
          schema:
            type: integer
        - in: path
          name: memberId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromoteMemberInput"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GangMember"

  /gangs/{gangId}/deposit:
    post:
      operationId: depositToGangTreasury
      tags: [gangs]
      summary: Deposit money to gang treasury
      parameters:
        - in: path
          name: gangId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TreasuryDeposit"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # --- WEAPONS ---
  /weapons:
    get:
      operationId: listWeapons
      tags: [weapons]
      summary: List all available weapons in the shop
      responses:
        "200":
          description: Weapons list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Weapon"

  /weapons/my:
    get:
      operationId: getMyWeapons
      tags: [weapons]
      summary: Get current player's weapons
      responses:
        "200":
          description: Player weapons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerWeapon"

  /weapons/{weaponId}/buy:
    post:
      operationId: buyWeapon
      tags: [weapons]
      summary: Buy a weapon from the shop
      parameters:
        - in: path
          name: weaponId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyWeaponInput"
      responses:
        "200":
          description: Purchased weapon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerWeapon"

  /ammo:
    get:
      operationId: listAmmo
      tags: [weapons]
      summary: List all ammo types
      responses:
        "200":
          description: Ammo types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ammo"

  /ammo/my:
    get:
      operationId: getMyAmmo
      tags: [weapons]
      summary: Get current player's ammo inventory
      responses:
        "200":
          description: Player ammo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerAmmo"

  /ammo/{ammoId}/buy:
    post:
      operationId: buyAmmo
      tags: [weapons]
      summary: Buy ammo
      parameters:
        - in: path
          name: ammoId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyAmmoInput"
      responses:
        "200":
          description: Purchased ammo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerAmmo"

  # --- ARMOR ---
  /armor:
    get:
      operationId: listArmorItems
      tags: [armor]
      summary: List all armor items in the shop
      responses:
        "200":
          description: Armor items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArmorItem"

  /armor/my:
    get:
      operationId: getMyArmor
      tags: [armor]
      summary: Get current player's armor items
      responses:
        "200":
          description: Player armor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerArmor"

  /armor/{armorId}/buy:
    post:
      operationId: buyArmor
      tags: [armor]
      summary: Buy an armor item
      parameters:
        - in: path
          name: armorId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyArmorInput"
      responses:
        "200":
          description: Purchased armor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerArmor"

  # --- BODYGUARDS ---
  /bodyguards/npc:
    get:
      operationId: listNpcBodyguards
      tags: [bodyguards]
      summary: List available NPC bodyguards to hire
      responses:
        "200":
          description: NPC bodyguards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NpcBodyguard"

  /bodyguards/npc/{guardId}/hire:
    post:
      operationId: hireNpcBodyguard
      tags: [bodyguards]
      summary: Hire an NPC bodyguard
      parameters:
        - in: path
          name: guardId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hired guard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /bodyguards/requests:
    get:
      operationId: listBodyguardRequests
      tags: [bodyguards]
      summary: List bodyguard requests (sent and received)
      responses:
        "200":
          description: Requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BodyguardRequestList"

  /bodyguards/request:
    post:
      operationId: sendBodyguardRequest
      tags: [bodyguards]
      summary: Send a bodyguard request to another player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BodyguardRequestInput"
      responses:
        "201":
          description: Request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BodyguardRequest"

  /bodyguards/requests/{requestId}/respond:
    post:
      operationId: respondToBodyguardRequest
      tags: [bodyguards]
      summary: Accept or reject a bodyguard request
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BodyguardResponse"
      responses:
        "200":
          description: Response processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /bodyguards/my:
    get:
      operationId: getMyBodyguards
      tags: [bodyguards]
      summary: Get current player's active bodyguards
      responses:
        "200":
          description: My bodyguards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyBodyguards"

  /bodyguards/{bodyguardId}/dismiss:
    delete:
      operationId: dismissBodyguard
      tags: [bodyguards]
      summary: Dismiss a bodyguard
      parameters:
        - in: path
          name: bodyguardId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # --- ATTACKS & SPY ---
  /attacks/spy/{targetPlayerId}:
    post:
      operationId: spyOnPlayer
      tags: [attacks]
      summary: Spy on another player to reveal their stats
      parameters:
        - in: path
          name: targetPlayerId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Spy result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpyResult"

  /attacks:
    post:
      operationId: initiateAttack
      tags: [attacks]
      summary: Initiate an attack on another player (starts travel timer)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttackInput"
      responses:
        "201":
          description: Attack initiated with travel timer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attack"

  /attacks/my:
    get:
      operationId: getMyAttacks
      tags: [attacks]
      summary: Get current player's attack history
      responses:
        "200":
          description: Attacks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attack"

  /attacks/incoming:
    get:
      operationId: getIncomingAttacks
      tags: [attacks]
      summary: Get incoming attacks on current player
      responses:
        "200":
          description: Incoming attacks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attack"

  /attacks/{attackId}/cancel:
    post:
      operationId: cancelAttack
      tags: [attacks]
      summary: Cancel a pending attack (while still traveling)
      parameters:
        - in: path
          name: attackId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # --- BLACK MARKET ---
  /blackmarket:
    get:
      operationId: listBlackMarket
      tags: [blackmarket]
      summary: List all black market listings
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [weapon, ammo, armor]
      responses:
        "200":
          description: Listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlackMarketListing"
    post:
      operationId: createListing
      tags: [blackmarket]
      summary: Create a new black market listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingInput"
      responses:
        "201":
          description: Created listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlackMarketListing"

  /blackmarket/my:
    get:
      operationId: getMyListings
      tags: [blackmarket]
      summary: Get current player's black market listings
      responses:
        "200":
          description: My listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlackMarketListing"

  /blackmarket/{listingId}/buy:
    post:
      operationId: buyListing
      tags: [blackmarket]
      summary: Buy a black market listing
      parameters:
        - in: path
          name: listingId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchased
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /blackmarket/{listingId}:
    delete:
      operationId: cancelListing
      tags: [blackmarket]
      summary: Cancel (remove) a black market listing
      parameters:
        - in: path
          name: listingId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # --- CRIMES ---
  /crimes:
    get:
      operationId: listCrimes
      tags: [crimes]
      summary: List available crime types
      responses:
        "200":
          description: Crime types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrimeType"

  /crimes/attempt:
    post:
      operationId: attemptCrime
      tags: [crimes]
      summary: Attempt a crime mission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrimeAttemptInput"
      responses:
        "200":
          description: Crime result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrimeResult"

  /crimes/history:
    get:
      operationId: getCrimeHistory
      tags: [crimes]
      summary: Get player's crime history
      responses:
        "200":
          description: Crime history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrimeRecord"

  # --- PRISON ---
  /prison/status:
    get:
      operationId: getPrisonStatus
      tags: [crimes]
      summary: Get current player's prison status
      responses:
        "200":
          description: Prison status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrisonStatus"

  /prison/escape:
    post:
      operationId: selfBribeEscape
      tags: [crimes]
      summary: Bribe guards to escape your own prison sentence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JailbreakInput"
      responses:
        "200":
          description: Escape result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JailbreakResult"

  /prison/jailbreak/{targetPlayerId}:
    post:
      operationId: attemptJailbreak
      tags: [crimes]
      summary: Attempt to break a gang member out of prison
      parameters:
        - in: path
          name: targetPlayerId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JailbreakInput"
      responses:
        "200":
          description: Jailbreak result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JailbreakResult"

  # --- CITIES ---
  /cities:
    get:
      operationId: listCities
      tags: [cities]
      summary: List all cities
      responses:
        "200":
          description: Cities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/City"

  /cities/travel:
    post:
      operationId: travelToCity
      tags: [cities]
      summary: Travel to another city
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TravelInput"
      responses:
        "200":
          description: Travel initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelResult"

  # --- ADMIN ---
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get server-wide stats (admin only)
      responses:
        "200":
          description: Server stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/players:
    get:
      operationId: getAdminPlayers
      tags: [admin]
      summary: List all players (admin only)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Player list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPlayerListResponse"

  /admin/players/{playerId}:
    patch:
      operationId: updateAdminPlayer
      tags: [admin]
      summary: Update player (admin only)
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPlayerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/players/{playerId}/reset:
    delete:
      operationId: resetAdminPlayer
      tags: [admin]
      summary: Reset player stats (admin only)
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/gangs:
    get:
      operationId: getAdminGangs
      tags: [admin]
      summary: List all gangs (admin only)
      responses:
        "200":
          description: Gang list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminGang"

  /admin/gangs/{gangId}:
    delete:
      operationId: deleteAdminGang
      tags: [admin]
      summary: Disband a gang (admin only)
      parameters:
        - name: gangId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Disbanded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/items/weapons:
    get:
      operationId: getAdminWeapons
      tags: [admin]
      summary: List all weapons in catalog (admin only)
      responses:
        "200":
          description: Weapons list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWeapon"
    post:
      operationId: createAdminWeapon
      tags: [admin]
      summary: Create a new weapon (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminWeaponCreate"
      responses:
        "201":
          description: Weapon created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminWeapon"

  /admin/items/weapons/{weaponId}:
    patch:
      operationId: updateAdminWeapon
      tags: [admin]
      summary: Update a weapon (admin only)
      parameters:
        - name: weaponId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminWeaponUpdate"
      responses:
        "200":
